services:
  db:
    image: postgres:latest
    container_name: umkm_db
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: umkm_db
    ports:
      - "5209:5432"
    volumes:
      - postgres_data:/var/lib/postgresql

volumes:
  postgres_data:
